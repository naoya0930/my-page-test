version: '3.8'

services:
  workers:
    build:
      context: .
      dockerfile: dockerfile
    working_dir: /app
    command: >
      sh -c "npm install --legacy-peer-deps &&
             npx wrangler d1 migrations apply ast_way_db --local --persist-to /app/.wrangler &&
             npx wrangler dev --ip 0.0.0.0 --port 8787 --persist-to /app/.wrangler"
    ports:
      - "8787:8787"
    volumes:
      - .:/app
      - /app/node_modules
      - wrangler_data:/app/.wrangler
    environment:
      - NODE_ENV=development
      - WRANGLER_SEND_METRICS=false

  web:
    build: .
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - workers

volumes:
  wrangler_data:
