version: '3.8'

services:
  web:
    build: .
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  workers:
    build:
      context: .
      dockerfile: dockerfile
    working_dir: /app
    command: sh -c "npx wrangler dev --ip 0.0.0.0 --port 8787"
    ports:
      - "8787:8787"
    volumes:
      - .:/app
      - /app/node_modules
      - wrangler_data:/app/.wrangler
    environment:
      - NODE_ENV=development
    depends_on:
      - web

volumes:
  wrangler_data:
