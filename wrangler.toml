name = "artist-way-support"
main = "./workers/index.js"
compatibility_date = "2025-01-01"
type = "javascript"

[dev]
  ip = "0.0.0.0"
  port = 8787

# 静的アセット（React SPA / dist）配信設定
# - directory: `npm run build` の成果物
# - not_found_handling: 未一致パスは index.html を返し、クライアントルーティング（react-router）にフォールバック
# - binding: Worker から env.ASSETS.fetch(request) で参照
[assets]
  directory = "./dist"
  not_found_handling = "single-page-application"
  binding = "ASSETS"

[vars]
  CF_D1_DATABASE_ID = "artist_way_db"

# 環境変数（.dev.vars から自動読み込み）
# - SUPABASE_JWT_SECRET: Supabase JWT 検証用シークレット
# - NEXT_PUBLIC_SUPABASE_URL: Supabase プロジェクト URL
# - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: Supabase 公開キー

# D1 データベース設定（ローカル開発用）
[[d1_databases]]
  binding = "DB"
  database_name = "ast_way_db"
  database_id = "549fa561-d582-4cd7-b989-00b3d71bb912"
