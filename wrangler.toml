name = "artist-way-support"
main = "./workers/index.js"
compatibility_date = "2025-01-01"
type = "javascript"

[dev]
  ip = "0.0.0.0"
  port = 8787

[vars]
  CF_D1_DATABASE_ID = "artist_way_db"

# D1 データベース設定（ローカル開発用）
[[d1_databases]]
  binding = "DB"
  database_name = "ast_way_db"
  database_id = "00000000-0000-0000-0000-000000000000"
